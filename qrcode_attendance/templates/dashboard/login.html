{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - PointagePro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-brand">
            <i class="fa-solid fa-qrcode"></i>
            <h1>PointagePro</h1>
            <p>Espace d'administration sécurisé</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <i class="fa-solid fa-circle-exclamation" style="margin-right: 0.5rem;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="login-form" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Adresse Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="admin@exemple.com" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" name="remember"> Se souvenir de moi
                </label>
                <a href="#" style="font-size: 0.85rem; font-weight: 500;">Mot de passe oublié ?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">
                Se connecter <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--clr-border); padding-top: 1.5rem;">
            <p style="font-size: 0.85rem; color: var(--clr-text-muted);">
                &copy; 2026 PointagePro. Tous droits réservés.
            </p>
        </div>
    </div>

</body>
</html>
